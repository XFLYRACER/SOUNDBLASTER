<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mini Music Player</title>

<style>

body{
background:#121212;
color:white;
font-family:Arial;
text-align:center;
}

h1{
margin-top:20px;
}

input{
width:300px;
padding:10px;
font-size:16px;
}

button{
padding:10px;
font-size:16px;
cursor:pointer;
}

#results{
margin-top:30px;
display:flex;
flex-wrap:wrap;
justify-content:center;
}

.song{
background:#1e1e1e;
margin:10px;
padding:10px;
width:220px;
cursor:pointer;
border-radius:8px;
}

.song:hover{
background:#333;
}

.song img{
width:100%;
border-radius:5px;
}

#player{
margin-top:30px;
}

</style>
</head>

<body>

<h1>Mini Music Player</h1>

<input id="search" placeholder="Cerca artista o canzone">
<button onclick="searchMusic()">Cerca</button>

<div id="player"></div>

<div id="results"></div>

<script>

async function searchMusic(){

let query = document.getElementById("search").value;

let url = "https://yewtu.be/api/v1/search?q=" +
encodeURIComponent(query) +
"&type=video";

let res = await fetch(url);
let data = await res.json();

let results = document.getElementById("results");
results.innerHTML="";

data.slice(0,10).forEach(v=>{

let thumb = v.videoThumbnails[2].url;

results.innerHTML += `
<div class="song" onclick="play('${v.videoId}')">
<img src="${thumb}">
<p>${v.title}</p>
<p style="color:#aaa">${v.author}</p>
</div>
`;

});

}

function play(id){

document.getElementById("player").innerHTML = `
<iframe width="560" height="315"
src="https://www.youtube.com/embed/${id}?autoplay=1"
frameborder="0"
allow="autoplay; encrypted-media"
allowfullscreen>
</iframe>
`;

window.scrollTo({top:0,behavior:"smooth"});

}

</script>

</body>
</html>
