<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mini Music App</title>

<style>

body{
background:#121212;
color:white;
font-family:Arial;
text-align:center;
}

input{
padding:10px;
width:300px;
font-size:16px;
}

button{
padding:10px;
font-size:16px;
}

#results{
display:flex;
flex-wrap:wrap;
justify-content:center;
margin-top:20px;
}

.song{
width:200px;
margin:10px;
background:#1e1e1e;
padding:10px;
cursor:pointer;
border-radius:8px;
}

.song:hover{
background:#333;
}

.song img{
width:100%;
border-radius:6px;
}

#playlist{
margin-top:30px;
}

</style>

</head>

<body>

<h1>Mini Music Player</h1>

<input id="q" placeholder="Cerca musica">
<button onclick="search()">Cerca</button>

<div id="player"></div>

<h2>Risultati</h2>
<div id="results"></div>

<h2>Playlist</h2>
<div id="playlist"></div>

<script>

let playlist = [];
let current = 0;

async function search(){

let q = document.getElementById("q").value;

let url =
"https://piped.video/api/v1/search?q=" +
encodeURIComponent(q) +
"&filter=videos";

let res = await fetch(url);
let data = await res.json();

let out = document.getElementById("results");
out.innerHTML="";

data.items.slice(0,8).forEach(v=>{

out.innerHTML += `
<div class="song" onclick="add('${v.url.split('v=')[1]}','${v.title}')">
<img src="${v.thumbnail}">
<p>${v.title}</p>
</div>
`;

});

}

function add(id,title){

playlist.push({id,title});
renderPlaylist();

if(playlist.length==1) play(0);

}

function renderPlaylist(){

let out = document.getElementById("playlist");
out.innerHTML="";

playlist.forEach((s,i)=>{

out.innerHTML += `
<div onclick="play(${i})">
${i+1}. ${s.title}
</div>
`;

});

}

function play(i){

current = i;

let id = playlist[i].id;

document.getElementById("player").innerHTML = `
<iframe id="ytplayer"
width="560"
height="315"
src="https://www.youtube.com/embed/${id}?autoplay=1&enablejsapi=1"
frameborder="0"
allow="autoplay"
allowfullscreen>
</iframe>
`;

}

</script>

</body>
</html>
