<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Mini Music Player</title>
<style>
body{
  background:#121212;
  color:white;
  font-family:Arial;
  text-align:center;
}
input{
  padding:10px;
  width:300px;
  font-size:16px;
}
button{
  padding:10px;
  font-size:16px;
  cursor:pointer;
}
#results, #playlist{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  margin-top:20px;
}
.song{
  width:200px;
  margin:10px;
  background:#1e1e1e;
  padding:10px;
  cursor:pointer;
  border-radius:8px;
}
.song:hover{
  background:#333;
}
.song img{
  width:100%;
  border-radius:6px;
}
#player{
  margin-top:30px;
}
</style>
</head>
<body>

<h1>Mini Music Player</h1>

<input id="q" placeholder="Cerca artista o canzone">
<button onclick="searchMusic()">Cerca</button>

<div id="player"></div>

<h2>Risultati</h2>
<div id="results"></div>

<h2>Playlist</h2>
<div id="playlist"></div>

<script>
let playlist = [];
let current = 0;

// Funzione per cercare video su YouTube tramite feed RSS + rss2json
async function searchMusic(){
  let query = document.getElementById("q").value;

  // URL ricerca YouTube (RSS feed globale con query)
  let rssUrl = "https://www.youtube.com/feeds/videos.xml?channel_id=UC-9-kyTW8ZkZNDHQJ6FgpwQ"; 
  // Puoi sostituire con altri canali musicali o playlist

  // Convertiamo RSS in JSON (senza CORS)
  let url = "https://api.rss2json.com/v1/api.json?rss_url=" + encodeURIComponent(rssUrl);

  try{
    let res = await fetch(url);
    let data = await res.json();

    let resultsDiv = document.getElementById("results");
    resultsDiv.innerHTML="";

    // Mostriamo solo i primi 8 video
    data.items.slice(0,8).forEach(v=>{
      let videoId = v.link.split("v=")[1];
      let thumb = v.thumbnail;

      resultsDiv.innerHTML += `
        <div class="song" onclick="addToPlaylist('${videoId}','${v.title}')">
          <img src="${thumb}">
          <p>${v.title}</p>
        </div>
      `;
    });

  } catch(e){
    console.error("Errore fetch RSS:",e);
  }
}

// Aggiungi video alla playlist
function addToPlaylist(id,title){
  playlist.push({id,title});
  renderPlaylist();
  if(playlist.length===1) play(0); // se primo elemento, parte subito
}

// Mostra playlist
function renderPlaylist(){
  let out = document.getElementById("playlist");
  out.innerHTML="";
  playlist.forEach((v,i)=>{
    out.innerHTML += `<div onclick="play(${i})">${i+1}. ${v.title}</div>`;
  });
}

// Riproduci video selezionato
function play(i){
  current = i;
  let id = playlist[i].id;
  document.getElementById("player").innerHTML = `
    <iframe width="560" height="315"
    src="https://www.youtube.com/embed/${id}?autoplay=1"
    frameborder="0"
    allow="autoplay; encrypted-media"
    allowfullscreen></iframe>
  `;
}
</script>

</body>
</html>
